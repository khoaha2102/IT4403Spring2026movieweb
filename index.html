<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Showcase</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>Movie Showcase</h1>
  <nav>
    <button>id="homeBtn">Home</button>
    <button>id= "searchBtn">Search</button>
    <button>id= "favoritesBtn">Favorites</button>
  </nav>
</header>

<main>

  <!-- HOME VIEW -->
  <section id="homeView">
    <h2>Popular Movies</h2>
    <div class="movie-grid">
      
      <!-- SAMPLE CARD (for design) -->
      <div class="movie-card">
        <img src="https://via.placeholder.com/200x300">
        <h3>Movie Title</h3>
        <p>⭐ 8.5</p>
      </div>

      <div class="movie-card">
        <img src="https://via.placeholder.com/200x300">
        <h3>Movie Title</h3>
        <p>⭐ 7.9</p>
      </div>

    </div>
  </section>

  <!-- SEARCH VIEW -->
  <section id="searchView">
    <h2>Search Movies</h2>

    <div class="search-bar">
      <input type="text" id ="searchInput" placeholder="Search movies...">
      <button id="searchSubmit">Search</button>
    </div>

 <div class="movie-grid"></div>
  </section>

  <--FAVORITES VIEW (ADD HERE) -->
<section id="favoritesView">
         <h2>Your Favorites</h2>
    <div class="movie-grid"></div>
 </section>

  <!-- DETAILS VIEW -->
  <section id="detailsView">
    <button>Back</button>

    <div class="movie-details">
      <img src="https://via.placeholder.com/300x450">
      <h2>Movie Title</h2>
      <p>Release Date: 2024</p>
      <p>Rating: 8.5</p>
      <p>Description goes here...</p>
    </div>
  </section>

</main>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
