<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Showcase</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>Movie Showcase</h1>
  <nav>
    <button id="homeBtn">Home</button>
    <button id="searchBtn">Search</button>
    <button id="favoritesBtn">Favorites</button>
  </nav>
</header>

<main>
  <section id="homeView">
    <h2>Popular Movies</h2>

    <div class="filter-bar">
      <label for="genreSelect">Filter by Genre:</label>
      <select id="genreSelect">
        <option value="">All Genres</option>
      </select>
    </div>

    <div class="movie-grid"></div>
  </section>

  <section id="searchView">
    <h2>Search Movies</h2>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search movies...">
      <button id="searchSubmit">Search</button>
    </div>
    <div class="movie-grid"></div>
  </section>

  <section id="favoritesView">
    <h2>Your Favorites</h2>
    <div class="movie-grid"></div>
  </section>

  <section id="detailsView">
    <button id="backBtn">Back</button>
    <div class="movie-details">
      <img src="https://placehold.co/300x450?text=Movie+Poster" alt="Movie Poster">
      <h2>Movie Title</h2>
      <p>Release Date: 2024</p>
      <p>Rating: 8.5</p>
      <p>Description goes here...</p>
    </div>
  </section>
</main>

<footer>
  <p>This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
</footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
